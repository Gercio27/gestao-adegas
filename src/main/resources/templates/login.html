<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Entrar')}"></head>
<body>
<div class="login-wrap">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h4 class="mb-1" style="color:#6b1f2a;"><i class="bi bi-droplet-half"></i> ACV Adegas</h4>
            <p class="text-muted small mb-4">Gestão de Vinhos de Talha</p>

            <div th:if="${param.error}" class="alert alert-danger py-2">Credenciais inválidas.</div>
            <div th:if="${param.logout}" class="alert alert-info py-2">Sessão terminada.</div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Utilizador</label>
                    <input type="text" name="username" class="form-control" autofocus required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Palavra-passe</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button class="btn w-100 text-white" style="background-color:#6b1f2a;" type="submit">Entrar</button>
            </form>
        </div>
    </div>
    <p class="text-center text-muted small mt-3">ACV – Produção e Comércio de Vinhos de Talha, Lda</p>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
