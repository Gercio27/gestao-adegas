<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Contentores de garrafas')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0"><i class="bi bi-grid-3x3-gap"></i> Contentores de garrafas</h3>
        <a th:href="@{/fichas/contentores/novo}" class="btn text-white" style="background-color:#6b1f2a;">
            <i class="bi bi-plus-lg"></i> Novo contentor
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr><th>Código</th><th>Nome</th><th>Formato</th><th class="text-end">Capac.</th>
                    <th>Local</th><th>Vinho (conteúdo)</th><th class="text-end">Garrafas</th><th>Rotulado</th><th class="text-end">Ações</th></tr>
                </thead>
                <tbody>
                <tr th:each="c : ${contentores}">
                    <td><span class="codigo" th:text="${c.codigo}"></span></td>
                    <td th:text="${c.nome}"></td>
                    <td th:text="${c.tipoGarrafa.descricao}"></td>
                    <td class="text-end" th:text="${c.capacidadeGarrafas}"></td>
                    <td th:text="${c.localizacao}"></td>
                    <td th:text="${c.vinhoNome ?: '—'}"></td>
                    <td class="text-end" th:text="${c.garrafasAtuais}"></td>
                    <td>
                        <span th:if="${c.garrafasAtuais > 0 and c.rotulado}" class="badge bg-success">Sim</span>
                        <span th:if="${c.garrafasAtuais > 0 and !c.rotulado}" class="badge bg-warning text-dark">Não</span>
                        <span th:if="${c.garrafasAtuais <= 0}" class="badge bg-secondary">Vazio</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/fichas/contentores/{id}/editar(id=${c.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/fichas/contentores/{id}/eliminar(id=${c.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Eliminar este contentor?');">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${contentores.isEmpty()}"><td colspan="9" class="text-center text-muted py-4">Sem contentores registados.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
