<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Depósitos')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0"><i class="bi bi-database-fill"></i> Depósitos / Cubas</h3>
        <a th:href="@{/fichas/depositos/novo}" class="btn text-white" style="background-color:#6b1f2a;">
            <i class="bi bi-plus-lg"></i> Novo depósito
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr><th>Código</th><th>Identificação</th><th>Tipo</th><th>Adega</th><th class="text-end">Capac. (L)</th>
                    <th class="text-end">Volume (L)</th><th>Estado</th><th>Propriedade</th><th class="text-end">Ações</th></tr>
                </thead>
                <tbody>
                <tr th:each="d : ${depositos}">
                    <td><span class="codigo" th:text="${d.codigo}"></span></td>
                    <td th:text="${d.identificacao}"></td>
                    <td th:text="${d.tipo}"></td>
                    <td th:text="${d.adega != null ? d.adega.nome : '—'}"></td>
                    <td class="text-end" th:text="${d.capacidadeLitros}"></td>
                    <td class="text-end" th:text="${d.volumeAtualLitros}"></td>
                    <td>
                        <span th:if="${d.vazia}" class="badge bg-secondary">Vazio</span>
                        <span th:unless="${d.vazia}" class="badge bg-success">Ocupado</span>
                    </td>
                    <td>
                        <span th:text="${d.propriedade.descricao}"></span>
                        <span th:if="${d.propriedade.name() == 'TERCEIRO'}" class="text-muted small" th:text="'(' + ${d.terceiro} + ')'"></span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/fichas/depositos/{id}/etiqueta(id=${d.id})}" target="_blank" class="btn btn-sm btn-outline-dark" title="Etiqueta">
                            <i class="bi bi-printer"></i>
                        </a>
                        <a th:href="@{/fichas/depositos/{id}/editar(id=${d.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/fichas/depositos/{id}/eliminar(id=${d.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Eliminar este depósito?');">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${depositos.isEmpty()}"><td colspan="9" class="text-center text-muted py-4">Sem depósitos registados.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
