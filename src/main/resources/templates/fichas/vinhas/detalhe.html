<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Vinha')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">
            <span class="codigo" th:text="${vinha.codigo}"></span> · <span th:text="${vinha.nome}"></span>
        </h3>
        <a th:href="@{/fichas/vinhas/{id}/editar(id=${vinha.id})}" class="btn btn-outline-secondary">
            <i class="bi bi-pencil"></i> Editar
        </a>
    </div>

    <div class="row g-3">
        <div class="col-md-8">
            <div class="card shadow-sm mb-3"><div class="card-body">
                <dl class="row mb-0">
                    <dt class="col-sm-3">Localização</dt><dd class="col-sm-9" th:text="${vinha.localizacao}">—</dd>
                    <dt class="col-sm-3">Propriedade</dt>
                    <dd class="col-sm-9">
                        <span th:text="${vinha.propriedade.descricao}"></span>
                        <span th:if="${vinha.propriedade.name() == 'TERCEIRO'}" th:text="'· ' + ${vinha.terceiro}"></span>
                    </dd>
                    <dt class="col-sm-3">Área total</dt><dd class="col-sm-9"><span th:text="${vinha.areaTotal}"></span> ha</dd>
                </dl>
            </div></div>

            <div class="card shadow-sm"><div class="card-header bg-white fw-bold">Parcelas</div>
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead><tr>
                            <th>Ident. / SIVV</th><th>Nome</th><th>Casta</th><th>Concelho</th><th>Freguesia</th><th>Região</th>
                            <th>Tipo cultura</th><th class="text-end">Ano</th><th class="text-end">Área (ha)</th>
                            <th class="text-end">Área enq.</th><th>Tipo</th><th>Últ. atual.</th><th>Observação</th>
                        </tr></thead>
                        <tbody>
                        <tr th:each="p : ${vinha.parcelas}">
                            <td th:text="${p.identificacao}"></td>
                            <td th:text="${p.nome ?: '—'}"></td>
                            <td th:text="${p.casta != null ? p.casta.nome : '—'}"></td>
                            <td th:text="${p.concelho ?: '—'}"></td>
                            <td th:text="${p.freguesia ?: '—'}"></td>
                            <td th:text="${p.regiao ?: '—'}"></td>
                            <td th:text="${p.tipoCultura ?: '—'}"></td>
                            <td class="text-end" th:text="${p.anoPlantacao ?: '—'}"></td>
                            <td class="text-end" th:text="${p.areaHa}"></td>
                            <td class="text-end" th:text="${p.areaEnqLegal ?: '—'}"></td>
                            <td th:text="${p.tipo ?: '—'}"></td>
                            <td th:text="${p.dataUltimaAtualizacao != null ? #temporals.format(p.dataUltimaAtualizacao,'dd-MM-yyyy') : '—'}"></td>
                            <td class="small" th:text="${p.observacao ?: '—'}"></td>
                        </tr>
                        <tr th:if="${vinha.parcelas.isEmpty()}"><td colspan="13" class="text-muted text-center py-3">Sem parcelas.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm"><div class="card-header bg-white fw-bold">Resumo por casta</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between" th:each="e : ${vinha.resumoPorCasta}">
                        <span th:text="${e.key}"></span>
                        <span class="fw-semibold"><span th:text="${e.value}"></span> ha</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between bg-light">
                        <span class="fw-bold">Total</span>
                        <span class="fw-bold"><span th:text="${vinha.areaTotal}"></span> ha</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <a th:href="@{/fichas/vinhas}" class="btn btn-link mt-3">&larr; Voltar às vinhas</a>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
