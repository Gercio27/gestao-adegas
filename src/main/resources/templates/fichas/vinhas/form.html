<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Vinha')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <h3 class="mb-3" th:text="${vinha.id == null} ? 'Nova vinha' : 'Editar vinha'">Vinha</h3>

    <div class="alert alert-danger" th:if="${erroParcela}" th:text="${erroParcela}"></div>

    <div class="card shadow-sm"><div class="card-body">
        <form th:action="@{/fichas/vinhas}" th:object="${vinha}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{codigo}">

            <div class="row g-3">
                <div class="col-md-3" th:if="${vinha.codigo != null}">
                    <label class="form-label">Código</label>
                    <input class="form-control" th:value="*{codigo}" disabled>
                </div>
                <div class="col-md-5">
                    <label class="form-label">Nome *</label>
                    <input type="text" class="form-control" th:field="*{nome}" required>
                    <div class="text-danger small" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Localização</label>
                    <input type="text" class="form-control" th:field="*{localizacao}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Propriedade</label>
                    <select class="form-select" th:field="*{propriedade}" onchange="toggleTerceiro(this)">
                        <option th:each="p : ${propriedades}" th:value="${p}" th:text="${p.descricao}"></option>
                    </select>
                </div>
                <div class="col-md-4" id="grpTerceiro">
                    <label class="form-label">Terceiro (se aplicável)</label>
                    <input type="text" class="form-control" th:field="*{terceiro}">
                </div>
            </div>

            <hr class="my-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="mb-0">Parcelas <span class="text-muted small">(registo SIVV/IVV)</span></h5>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addParcela()">
                    <i class="bi bi-plus-lg"></i> Adicionar parcela
                </button>
            </div>
            <p class="text-muted small">Não pode repetir a mesma identificação com a mesma casta (mas pode a mesma identificação com castas diferentes).</p>

            <div id="parcelasBody">
                <div class="parcela-card border rounded p-3 mb-3" th:each="p, stat : *{parcelas}">
                    <div class="row g-2">
                        <div class="col-md-4">
                            <label class="form-label small mb-0">Identificação / Registo SIVV</label>
                            <input class="form-control" th:field="*{parcelas[__${stat.index}__].identificacao}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small mb-0">Nome</label>
                            <input class="form-control" th:field="*{parcelas[__${stat.index}__].nome}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small mb-0">Casta</label>
                            <select class="form-select" th:field="*{parcelas[__${stat.index}__].casta}">
                                <option th:value="${null}">—</option>
                                <option th:each="c : ${castas}" th:value="${c.id}" th:text="${c.nome}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small mb-0">Concelho</label>
                            <input class="form-control" th:field="*{parcelas[__${stat.index}__].concelho}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small mb-0">Freguesia</label>
                            <input class="form-control" th:field="*{parcelas[__${stat.index}__].freguesia}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small mb-0">Região</label>
                            <input class="form-control" th:field="*{parcelas[__${stat.index}__].regiao}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small mb-0">Tipo de cultura</label>
                            <input class="form-control" placeholder="Ex.: Contínua" th:field="*{parcelas[__${stat.index}__].tipoCultura}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small mb-0">Ano plantação</label>
                            <input type="number" min="1900" max="2100" class="form-control" placeholder="2005" th:field="*{parcelas[__${stat.index}__].anoPlantacao}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small mb-0">Área vinha (ha)</label>
                            <input type="number" step="0.0001" min="0" class="form-control" th:field="*{parcelas[__${stat.index}__].areaHa}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small mb-0">Área enq. legal (ha)</label>
                            <input type="number" step="0.0001" min="0" class="form-control" th:field="*{parcelas[__${stat.index}__].areaEnqLegal}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small mb-0">Tipo</label>
                            <input class="form-control" th:field="*{parcelas[__${stat.index}__].tipo}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small mb-0">Data última atualização</label>
                            <input type="date" class="form-control" th:field="*{parcelas[__${stat.index}__].dataUltimaAtualizacao}">
                        </div>
                        <div class="col-12">
                            <label class="form-label small mb-0">Observação</label>
                            <input class="form-control" th:field="*{parcelas[__${stat.index}__].observacao}">
                        </div>
                    </div>
                    <div class="text-end mt-2">
                        <button type="button" class="btn btn-sm btn-outline-danger" onclick="removerParcela(this)">
                            <i class="bi bi-trash"></i> Remover parcela
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-3">
                <button class="btn text-white" style="background-color:#6b1f2a;" type="submit">Guardar</button>
                <a th:href="@{/fichas/vinhas}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div></div>
</div>

<!-- Modelo de cartão de parcela (opções de casta renderizadas no servidor) -->
<template id="parcelaTemplate">
    <div class="parcela-card border rounded p-3 mb-3">
        <div class="row g-2">
            <div class="col-md-4">
                <label class="form-label small mb-0">Identificação / Registo SIVV</label>
                <input class="form-control" name="parcelas[__IDX__].identificacao">
            </div>
            <div class="col-md-4">
                <label class="form-label small mb-0">Nome</label>
                <input class="form-control" name="parcelas[__IDX__].nome">
            </div>
            <div class="col-md-4">
                <label class="form-label small mb-0">Casta</label>
                <select class="form-select" name="parcelas[__IDX__].casta">
                    <option value="">—</option>
                    <option th:each="c : ${castas}" th:value="${c.id}" th:text="${c.nome}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small mb-0">Concelho</label>
                <input class="form-control" name="parcelas[__IDX__].concelho">
            </div>
            <div class="col-md-3">
                <label class="form-label small mb-0">Freguesia</label>
                <input class="form-control" name="parcelas[__IDX__].freguesia">
            </div>
            <div class="col-md-3">
                <label class="form-label small mb-0">Região</label>
                <input class="form-control" name="parcelas[__IDX__].regiao">
            </div>
            <div class="col-md-3">
                <label class="form-label small mb-0">Tipo de cultura</label>
                <input class="form-control" placeholder="Ex.: Contínua" name="parcelas[__IDX__].tipoCultura">
            </div>
            <div class="col-md-2">
                <label class="form-label small mb-0">Ano plantação</label>
                <input type="number" min="1900" max="2100" class="form-control" placeholder="2005" name="parcelas[__IDX__].anoPlantacao">
            </div>
            <div class="col-md-2">
                <label class="form-label small mb-0">Área vinha (ha)</label>
                <input type="number" step="0.0001" min="0" class="form-control" name="parcelas[__IDX__].areaHa">
            </div>
            <div class="col-md-2">
                <label class="form-label small mb-0">Área enq. legal (ha)</label>
                <input type="number" step="0.0001" min="0" class="form-control" name="parcelas[__IDX__].areaEnqLegal">
            </div>
            <div class="col-md-2">
                <label class="form-label small mb-0">Tipo</label>
                <input class="form-control" name="parcelas[__IDX__].tipo">
            </div>
            <div class="col-md-4">
                <label class="form-label small mb-0">Data última atualização</label>
                <input type="date" class="form-control" name="parcelas[__IDX__].dataUltimaAtualizacao">
            </div>
            <div class="col-12">
                <label class="form-label small mb-0">Observação</label>
                <input class="form-control" name="parcelas[__IDX__].observacao">
            </div>
        </div>
        <div class="text-end mt-2">
            <button type="button" class="btn btn-sm btn-outline-danger" onclick="removerParcela(this)">
                <i class="bi bi-trash"></i> Remover parcela
            </button>
        </div>
    </div>
</template>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
    let contador = /*[[${vinha.parcelas.size()}]]*/ 0;

    function addParcela() {
        const tpl = document.getElementById('parcelaTemplate').innerHTML.replaceAll('__IDX__', contador);
        document.getElementById('parcelasBody').insertAdjacentHTML('beforeend', tpl);
        contador++;
    }
    function removerParcela(btn) {
        btn.closest('.parcela-card').remove();
    }
    function toggleTerceiro(sel) {
        document.getElementById('grpTerceiro').style.display = (sel.value === 'TERCEIRO') ? '' : 'none';
    }
    document.addEventListener('DOMContentLoaded', function () {
        toggleTerceiro(document.querySelector('[name=propriedade]'));
    });
</script>
</body>
</html>
