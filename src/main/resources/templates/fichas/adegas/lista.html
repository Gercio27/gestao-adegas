<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Adegas')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0"><i class="bi bi-house-door"></i> Adegas</h3>
        <a th:href="@{/fichas/adegas/nova}" class="btn text-white" style="background-color:#6b1f2a;">
            <i class="bi bi-plus-lg"></i> Nova adega
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr><th>Código</th><th>Nome</th><th>Localização</th><th>Morada</th><th class="text-end">Ações</th></tr>
                </thead>
                <tbody>
                <tr th:each="a : ${adegas}">
                    <td><span class="codigo" th:text="${a.codigo}"></span></td>
                    <td th:text="${a.nome}"></td>
                    <td th:text="${a.localizacao}"></td>
                    <td th:text="${a.morada}"></td>
                    <td class="text-end">
                        <a th:href="@{/fichas/adegas/{id}/editar(id=${a.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/fichas/adegas/{id}/eliminar(id=${a.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Eliminar esta adega?');">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${adegas.isEmpty()}"><td colspan="5" class="text-center text-muted py-4">Sem adegas registadas.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
