<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Adega')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <h3 class="mb-3" th:text="${adega.id == null} ? 'Nova adega' : 'Editar adega'">Adega</h3>

    <div class="card shadow-sm"><div class="card-body">
        <form th:action="@{/fichas/adegas}" th:object="${adega}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{codigo}">

            <div class="col-md-3" th:if="${adega.codigo != null}">
                <label class="form-label">Código</label>
                <input class="form-control" th:value="*{codigo}" disabled>
            </div>
            <div class="col-md-6">
                <label class="form-label">Nome *</label>
                <input type="text" class="form-control" th:field="*{nome}" required>
                <div class="text-danger small" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Localização</label>
                <input type="text" class="form-control" th:field="*{localizacao}">
            </div>
            <div class="col-12">
                <label class="form-label">Morada</label>
                <input type="text" class="form-control" th:field="*{morada}">
            </div>
            <div class="col-12">
                <button class="btn text-white" style="background-color:#6b1f2a;" type="submit">Guardar</button>
                <a th:href="@{/fichas/adegas}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div></div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
