<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Planeamento')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <h3 class="mb-3" th:text="${plano.id == null} ? 'Nova linha de planeamento' : 'Editar planeamento'">Planeamento</h3>

    <div class="card shadow-sm"><div class="card-body">
        <form th:action="@{/planeamento}" th:object="${plano}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{codigo}">

            <div class="col-md-6">
                <label class="form-label">Vinha</label>
                <select class="form-select" th:field="*{vinha}">
                    <option th:value="${null}">—</option>
                    <option th:each="v : ${vinhas}" th:value="${v.id}" th:text="${v.nome}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Casta</label>
                <select class="form-select" th:field="*{casta}">
                    <option th:value="${null}">—</option>
                    <option th:each="c : ${castas}" th:value="${c.id}" th:text="${c.nome}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Quantidade prevista (kg)</label>
                <input type="number" step="0.01" min="0" class="form-control" th:field="*{quantidadePrevistaKg}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Data prevista de vindima</label>
                <input type="date" class="form-control" th:field="*{dataPrevistaVindima}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Adega de destino</label>
                <select class="form-select" th:field="*{adegaDestino}">
                    <option th:value="${null}">—</option>
                    <option th:each="a : ${adegas}" th:value="${a.id}" th:text="${a.nome}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">% participação</label>
                <input type="number" step="0.01" min="0" max="100" class="form-control" th:field="*{percentagem}">
            </div>
            <div class="col-12">
                <label class="form-label">Vinho a fazer</label>
                <input type="text" class="form-control" th:field="*{nomeVinho}" placeholder="Ex.: Talha Tinto 2026">
            </div>

            <div class="col-12">
                <button class="btn text-white" style="background-color:#6b1f2a;" type="submit">Guardar</button>
                <a th:href="@{/planeamento}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div></div>
    <p class="text-muted small mt-2">Os resultados da análise à maturação aparecem automaticamente no mapa, para esta vinha e casta.</p>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
