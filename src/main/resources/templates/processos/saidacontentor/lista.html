<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt">
<head th:replace="~{fragments/layout :: head('Saídas de contentor')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0"><i class="bi bi-box-arrow-up"></i> Saídas de contentor</h3>
        <a th:href="@{/processos/saida-contentor/nova}" class="btn text-white" style="background-color:#6b1f2a;">
            <i class="bi bi-plus-lg"></i> Nova saída
        </a>
    </div>
    <p class="text-muted">Saídas de garrafas de um contentor por certificação, prova, reserva da adega, promoção ou outras (não é entrega ao comercial).</p>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr><th>Código</th><th>Contentor</th><th>Vinho</th><th class="text-end">Garrafas</th>
                    <th>Motivo</th><th>Observação</th><th>Data</th><th class="text-end">Ações</th></tr>
                </thead>
                <tbody>
                <tr th:each="s : ${saidas}">
                    <td><span class="codigo" th:text="${s.codigo}"></span></td>
                    <td th:text="${s.contentorNome ?: '—'}"></td>
                    <td th:text="${s.vinhoNome ?: '—'}"></td>
                    <td class="text-end" th:text="${s.quantidade}"></td>
                    <td><span class="badge bg-secondary" th:text="${s.motivo.descricao}"></span></td>
                    <td class="small" th:text="${s.observacao ?: '—'}"></td>
                    <td th:text="${s.dataSaida != null ? #temporals.format(s.dataSaida,'dd-MM-yyyy HH:mm') : ''}"></td>
                    <td class="text-end">
                        <form th:action="@{/processos/saida-contentor/{id}/eliminar(id=${s.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Anular esta saída? As garrafas voltam ao contentor.');">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${saidas.isEmpty()}"><td colspan="8" class="text-center text-muted py-4">Sem saídas registadas.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
