<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Rotulagem')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <h3 class="mb-1" th:text="${rotulagem.id == null} ? 'Nova rotulagem' : 'Editar rotulagem'">Rotulagem</h3>
    <p class="text-muted">Fase 7. Ao <strong>fechar</strong>, dá baixa de rótulos/cápsulas/caixas e marca o vinho engarrafado como rotulado.</p>

    <div class="card shadow-sm"><div class="card-body">
        <form th:action="@{/processos/rotulagem}" th:object="${rotulagem}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{codigo}">

            <div class="col-md-3" th:if="${rotulagem.codigo != null}">
                <label class="form-label">Código</label>
                <input class="form-control" th:value="*{codigo}" disabled>
            </div>
            <div class="col-md-6">
                <label class="form-label">Vinho engarrafado *</label>
                <select class="form-select" th:field="*{engarrafado}" id="rot-veg" onchange="mostrarContentores()" required>
                    <option th:value="${null}">—</option>
                    <option th:each="v : ${engarrafados}" th:value="${v.id}"
                            th:text="${v.codigo} + ' · ' + ${v.nome} + ' · ' + ${v.numeroGarrafas} + ' garrafas'"></option>
                </select>
                <div class="form-text" th:if="${engarrafados.isEmpty()}">Não há vinhos engarrafados por rotular. Faça um engarrafamento (Fase 6).</div>
            </div>
            <div class="col-md-3">
                <label class="form-label">Nº garrafas rotuladas</label>
                <input type="number" min="0" class="form-control" th:field="*{numeroGarrafas}">
            </div>
            <div class="col-12">
                <label class="form-label">Onde está (contentores)</label>
                <div class="border rounded p-2" id="rot-contentores"><span class="text-muted small">Escolha o vinho engarrafado.</span></div>
            </div>

            <div class="col-md-4">
                <label class="form-label">Rótulos *</label>
                <select class="form-select" th:field="*{rotulo}" required>
                    <option th:value="${null}">—</option>
                    <option th:each="r : ${rotulos}" th:value="${r.id}" th:text="${r.codigo} + ' · ' + ${r.descricao} + ' · stock ' + ${r.stock}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Nº rótulos *</label>
                <input type="number" min="1" class="form-control" th:field="*{numeroRotulos}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Cápsulas</label>
                <select class="form-select" th:field="*{capsula}">
                    <option th:value="${null}">— (sem cápsula)</option>
                    <option th:each="c : ${capsulas}" th:value="${c.id}" th:text="${c.codigo} + ' · ' + ${c.descricao} + ' · stock ' + ${c.stock}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Nº cápsulas</label>
                <input type="number" min="0" class="form-control" th:field="*{numeroCapsulas}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Caixas</label>
                <select class="form-select" th:field="*{caixa}">
                    <option th:value="${null}">— (sem caixa)</option>
                    <option th:each="c : ${caixas}" th:value="${c.id}" th:text="${c.codigo} + ' · ' + ${c.descricao} + ' · stock ' + ${c.stock}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Nº caixas</label>
                <input type="number" min="0" class="form-control" th:field="*{numeroCaixas}">
            </div>
            <div class="col-md-2">
                <label class="form-label">Responsável</label>
                <select class="form-select" th:field="*{responsavel}">
                    <option th:value="${null}">—</option>
                    <option th:each="t : ${trabalhadores}" th:value="${t.id}" th:text="${t.nome}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Início</label>
                <input type="datetime-local" class="form-control" th:field="*{dataHoraInicio}">
            </div>
            <div class="col-md-2">
                <label class="form-label">Fim</label>
                <input type="datetime-local" class="form-control" th:field="*{dataHoraFim}">
            </div>

            <div class="col-md-6">
                <label class="form-label">Meios utilizados</label>
                <input type="text" class="form-control" th:field="*{meios}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Métodos utilizados</label>
                <input type="text" class="form-control" th:field="*{metodos}">
            </div>
            <div class="col-12">
                <label class="form-label">Observações</label>
                <textarea class="form-control" th:field="*{observacoes}" rows="2"></textarea>
            </div>

            <div class="col-12">
                <button class="btn text-white" style="background-color:#6b1f2a;" type="submit">Guardar</button>
                <a th:href="@{/processos/rotulagem}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div></div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
    const contentoresPorEngarrafado = /*[[${contentoresPorEngarrafado}]]*/ {};
    function mostrarContentores() {
        const veg = document.getElementById('rot-veg').value;
        const box = document.getElementById('rot-contentores');
        const locais = veg ? contentoresPorEngarrafado[veg] : null;
        if (!veg) { box.innerHTML = '<span class="text-muted small">Escolha o vinho engarrafado.</span>'; return; }
        if (!locais || !locais.length) { box.innerHTML = '<span class="text-muted small">Sem contentores associados a este vinho.</span>'; return; }
        box.innerHTML = locais.map(function (l) { return '<div class="small">• ' + l + '</div>'; }).join('');
    }
    document.addEventListener('DOMContentLoaded', mostrarContentores);
</script>
</body>
</html>
