<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Certificação')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h3 class="mb-0"><i class="bi bi-patch-check"></i> Certificações <span class="badge bg-secondary">Fase 5 / 6.4</span></h3>
        <a th:href="@{/processos/certificacao/nova}" class="btn text-white" style="background-color:#6b1f2a;">
            <i class="bi bi-plus-lg"></i> Novo pedido
        </a>
    </div>
    <p class="text-muted" th:text="${admin} ? 'Como administrador, vê todas.' : 'Vê os que abriu.'"></p>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr><th>Código</th><th>Alvo</th><th>Produto</th><th>Entidade</th><th>Resultado</th><th>Validade</th><th>Estado</th><th class="text-end">Ações</th></tr>
                </thead>
                <tbody>
                <tr th:each="p : ${processos}">
                    <td><a th:href="@{/processos/certificacao/{id}(id=${p.id})}"><span class="codigo" th:text="${p.codigo}"></span></a></td>
                    <td th:text="${p.alvo.descricao}"></td>
                    <td class="small" th:text="${p.alvoDescricao}"></td>
                    <td th:text="${p.entidade ?: '—'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${p.resultado.name() == 'APROVADO'} ? 'bg-success' : (${p.resultado.name() == 'REPROVADO'} ? 'bg-danger' : 'bg-secondary')"
                              th:text="${p.resultado.descricao}"></span>
                    </td>
                    <td th:text="${p.validade != null ? #temporals.format(p.validade,'dd-MM-yyyy') : '—'}"></td>
                    <td>
                        <span th:if="${p.aberto}" class="badge bg-warning text-dark">Aberto</span>
                        <span th:unless="${p.aberto}" class="badge bg-success">Fechado</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/processos/certificacao/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a>
                    </td>
                </tr>
                <tr th:if="${processos.isEmpty()}"><td colspan="8" class="text-center text-muted py-4">Sem certificações registadas.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
