<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Atestos')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h3 class="mb-0"><i class="bi bi-arrow-left-right"></i> Fermentação — Atesto <span class="badge bg-secondary">Fase 4.2</span></h3>
        <a th:href="@{/processos/atesto/novo}" class="btn text-white" style="background-color:#6b1f2a;">
            <i class="bi bi-plus-lg"></i> Novo atesto
        </a>
    </div>
    <p class="text-muted" th:text="${admin} ? 'Como administrador, vê todos os atestos.' : 'Vê os atestos que abriu.'"></p>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr><th>Código</th><th>Origem</th><th>Destino</th><th class="text-end">Litros</th>
                    <th>Início</th><th>Estado</th><th class="text-end">Ações</th></tr>
                </thead>
                <tbody>
                <tr th:each="p : ${processos}">
                    <td><a th:href="@{/processos/atesto/{id}(id=${p.id})}"><span class="codigo" th:text="${p.codigo}"></span></a></td>
                    <td th:text="${p.origemDescricao}"></td>
                    <td th:text="${p.destinoDescricao}"></td>
                    <td class="text-end" th:text="${p.litros}"></td>
                    <td th:text="${p.dataHoraInicio != null ? #temporals.format(p.dataHoraInicio,'dd-MM-yyyy HH:mm') : ''}"></td>
                    <td>
                        <span th:if="${p.aberto}" class="badge bg-warning text-dark">Aberto</span>
                        <span th:unless="${p.aberto}" class="badge bg-success">Fechado</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/processos/atesto/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a>
                    </td>
                </tr>
                <tr th:if="${processos.isEmpty()}"><td colspan="7" class="text-center text-muted py-4">Sem atestos registados.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
