<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt">
<head th:replace="~{fragments/layout :: head('Moagem')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">
            <i class="bi bi-gear-wide-connected"></i>
            <span class="codigo" th:text="${moagem.codigo}"></span>
            <span th:if="${moagem.aberto}" class="badge bg-warning text-dark align-middle">Aberto</span>
            <span th:unless="${moagem.aberto}" class="badge bg-success align-middle">Fechado</span>
        </h3>
        <div>
            <a th:if="${moagem.aberto}" th:href="@{/processos/moagem/{id}/editar(id=${moagem.id})}"
               class="btn btn-outline-secondary"><i class="bi bi-pencil"></i> Editar</a>
            <form th:if="${moagem.aberto}" th:action="@{/processos/moagem/{id}/fechar(id=${moagem.id})}"
                  method="post" class="d-inline"
                  onsubmit="return confirm('Fechar a moagem? Vão ser geradas as fichas de mosto e somados os litros às talhas/depósitos.');">
                <button class="btn btn-success"><i class="bi bi-lock"></i> Fechar e gerar mostos</button>
            </form>
            <form sec:authorize="hasRole('ADMIN')" th:unless="${moagem.aberto}"
                  th:action="@{/processos/moagem/{id}/reabrir(id=${moagem.id})}" method="post" class="d-inline"
                  onsubmit="return confirm('Reabrir? Os mostos gerados serão anulados e os volumes repostos.');">
                <button class="btn btn-outline-warning"><i class="bi bi-unlock"></i> Reabrir</button>
            </form>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">Processo</div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-4">Adega</dt><dd class="col-sm-8" th:text="${moagem.adega != null ? moagem.adega.nome : '—'}"></dd>
                        <dt class="col-sm-4">Vindima origem</dt><dd class="col-sm-8" th:text="${moagem.vindima != null ? moagem.vindima.codigo : '—'}"></dd>
                        <dt class="col-sm-4">Vinha</dt><dd class="col-sm-8" th:text="${moagem.vinha != null ? moagem.vinha.nome : '—'}"></dd>
                        <dt class="col-sm-4">Responsável</dt><dd class="col-sm-8" th:text="${moagem.responsavel != null ? moagem.responsavel.nome : '—'}"></dd>
                        <dt class="col-sm-4">Início</dt><dd class="col-sm-8" th:text="${moagem.dataHoraInicio != null ? #temporals.format(moagem.dataHoraInicio,'dd-MM-yyyy HH:mm') : '—'}"></dd>
                        <dt class="col-sm-4">Fim</dt><dd class="col-sm-8" th:text="${moagem.dataHoraFim != null ? #temporals.format(moagem.dataHoraFim,'dd-MM-yyyy HH:mm') : '—'}"></dd>
                        <dt class="col-sm-4">Meios</dt><dd class="col-sm-8" th:text="${moagem.meios ?: '—'}"></dd>
                        <dt class="col-sm-4">Métodos</dt><dd class="col-sm-8" th:text="${moagem.metodos ?: '—'}"></dd>
                        <dt class="col-sm-4">Observações</dt><dd class="col-sm-8" th:text="${moagem.observacoes ?: '—'}"></dd>
                    </dl>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-white fw-bold">Enchimentos previstos</div>
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead><tr><th>Recipiente</th><th class="text-end">Litros</th><th>Casta</th></tr></thead>
                        <tbody>
                        <tr th:each="e : ${moagem.enchimentos}">
                            <td th:text="${e.recipienteDescricao}"></td>
                            <td class="text-end" th:text="${e.litros}"></td>
                            <td th:text="${e.casta != null ? e.casta.nome : '—'}"></td>
                        </tr>
                        <tr th:if="${moagem.enchimentos.isEmpty()}"><td colspan="3" class="text-muted text-center py-3">Sem enchimentos.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card shadow-sm" th:if="${!mostos.isEmpty()}">
                <div class="card-header bg-white fw-bold text-success">
                    <i class="bi bi-droplet-fill"></i> Mostos gerados
                </div>
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead><tr><th>Código</th><th>Localização</th><th class="text-end">Litros</th><th>Casta</th></tr></thead>
                        <tbody>
                        <tr th:each="m : ${mostos}">
                            <td><span class="codigo" th:text="${m.codigo}"></span></td>
                            <td th:text="${m.localizacao}"></td>
                            <td class="text-end" th:text="${m.litros}"></td>
                            <td th:text="${m.casta != null ? m.casta.nome : '—'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <a th:href="@{/processos/moagem}" class="btn btn-link mt-3">&larr; Voltar às moagens</a>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
