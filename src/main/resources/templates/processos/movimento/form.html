<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-PT">
<head th:replace="~{fragments/layout :: head('Movimento de mosto')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <h3 class="mb-1" th:text="${mov.id == null} ? 'Novo movimento de mosto' : 'Editar movimento'">Movimento</h3>
    <p class="text-muted">Fase 4.3 — Fermentação · Entradas / Saídas de mosto (DA). Escolha a adega e o vinho; aparecem as talhas/depósitos com mosto. Ao <strong>fechar</strong>, aplica o movimento e emite o DA.</p>

    <div class="card shadow-sm"><div class="card-body">
        <form th:action="@{/processos/movimento-mosto}" th:object="${mov}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{codigo}">

            <div class="col-md-4">
                <label class="form-label">Tipo *</label>
                <select class="form-select" th:field="*{tipo}" id="mv-tipo" onchange="atualizar()">
                    <option th:each="t : ${tipos}" th:value="${t}" th:text="${t.descricao}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Adega</label>
                <select class="form-select" id="mv-adega" onchange="atualizar()">
                    <option value="">— escolher adega —</option>
                    <option th:each="a : ${adegas}" th:value="${a.id}" th:text="${a.nome}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Vinho</label>
                <select class="form-select" id="mv-vinho" onchange="atualizar()">
                    <option value="">— escolher vinho —</option>
                    <option th:each="v : ${vinhos}" th:value="${v.id}" th:text="${v.nome}"></option>
                </select>
            </div>

            <!-- SAÍDA: mosto a mover (talhas/depósitos com mosto do vinho, na adega) -->
            <div class="col-md-8" id="grpMosto">
                <label class="form-label">Mosto (talha/depósito com mosto)</label>
                <select class="form-select" th:field="*{mostoOrigem}" th:attr="data-sel=${mov.mostoOrigem != null ? mov.mostoOrigem.id : ''}">
                    <option value="">—</option>
                    <option th:if="${mov.mostoOrigem != null}" th:value="${mov.mostoOrigem.id}"
                            th:text="${mov.mostoOrigem.codigo + ' · ' + mov.mostoOrigem.localizacao + ' · ' + mov.mostoOrigem.litros + ' L'}"></option>
                </select>
            </div>

            <!-- ENTRADA: recipiente de destino (na adega) -->
            <div class="col-md-8" id="grpDestino">
                <label class="form-label">Recipiente de destino (na adega)</label>
                <select class="form-select" th:field="*{destinoRef}" th:attr="data-sel=*{destinoRef}">
                    <option value="">—</option>
                    <option th:if="${mov.destinoRef != null and !#strings.isEmpty(mov.destinoRef)}"
                            th:value="*{destinoRef}" th:text="*{destinoDescricao}"></option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Litros *</label>
                <input type="number" step="0.01" min="0" class="form-control" th:field="*{litros}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label"><span id="lblContraparte">Fornecedor / Cliente</span></label>
                <input type="text" class="form-control" th:field="*{contraparte}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Transporte</label>
                <input type="text" class="form-control" th:field="*{transporte}">
            </div>

            <div class="col-md-4">
                <label class="form-label">Responsável</label>
                <select class="form-select" th:field="*{responsavel}">
                    <option th:value="${null}">—</option>
                    <option th:each="t : ${trabalhadores}" th:value="${t.id}" th:text="${t.nome}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Início</label>
                <input type="datetime-local" class="form-control" th:field="*{dataHoraInicio}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Observações</label>
                <input type="text" class="form-control" th:field="*{observacoes}">
            </div>

            <div class="col-12">
                <button class="btn text-white" style="background-color:#6b1f2a;" type="submit">Guardar</button>
                <a th:href="@{/processos/movimento-mosto}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div></div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
    const mostosPorVinho = /*[[${mostosPorVinho}]]*/ {};
    const recipientesPorAdega = /*[[${recipientesPorAdega}]]*/ {};

    function toggleTipo() {
        const entrada = (document.getElementById('mv-tipo').value === 'ENTRADA');
        document.getElementById('grpMosto').style.display = entrada ? 'none' : '';
        document.getElementById('grpDestino').style.display = entrada ? '' : 'none';
        document.getElementById('lblContraparte').textContent = entrada ? 'Fornecedor' : 'Cliente';
    }

    function atualizar() {
        toggleTipo();
        const adega = document.getElementById('mv-adega').value;
        const vinho = document.getElementById('mv-vinho').value;

        // SAÍDA: mostos do vinho, na adega escolhida
        const mostoSel = document.querySelector('[name="mostoOrigem"]');
        const guardadoM = mostoSel.dataset.sel || '';
        let lista = (vinho && mostosPorVinho[vinho]) ? mostosPorVinho[vinho] : [];
        if (adega) lista = lista.filter(function (m) { return String(m.adegaId) === adega; });
        let h = '<option value="">—</option>';
        lista.forEach(function (m) { h += '<option value="' + m.id + '">' + m.label + '</option>'; });
        mostoSel.innerHTML = h;
        if (guardadoM) { mostoSel.value = guardadoM; }

        // ENTRADA: recipientes da adega
        const destSel = document.querySelector('[name="destinoRef"]');
        const guardadoD = destSel.dataset.sel || '';
        const recs = (adega && recipientesPorAdega[adega]) ? recipientesPorAdega[adega] : [];
        let h2 = '<option value="">—</option>';
        recs.forEach(function (r) {
            const estilo = r.cheia ? ' style="color:#b00020;font-weight:600;"' : '';
            h2 += '<option value="' + r.ref + '"' + estilo + '>' + r.label + '</option>';
        });
        destSel.innerHTML = h2;
        if (guardadoD) { destSel.value = guardadoD; }
    }

    document.addEventListener('DOMContentLoaded', toggleTipo);
</script>
</body>
</html>
