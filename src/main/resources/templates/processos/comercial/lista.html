<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Comercial')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h3 class="mb-0"><i class="bi bi-truck"></i> Passagem ao comercial <span class="badge bg-secondary">Fase 8</span></h3>
        <a th:href="@{/processos/comercial/nova}" class="btn text-white" style="background-color:#6b1f2a;">
            <i class="bi bi-plus-lg"></i> Nova entrega
        </a>
    </div>
    <p class="text-muted" th:text="${admin} ? 'Como administrador, vê todas.' : 'Vê as que abriu.'"></p>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr><th>Código</th><th>Nota</th><th>Vinho</th><th class="text-end">Garrafas</th>
                    <th>Destinatário</th><th>Estado</th><th class="text-end">Ações</th></tr>
                </thead>
                <tbody>
                <tr th:each="p : ${processos}">
                    <td><a th:href="@{/processos/comercial/{id}(id=${p.id})}"><span class="codigo" th:text="${p.codigo}"></span></a></td>
                    <td><span class="codigo" th:text="${p.numeroNota ?: '—'}"></span></td>
                    <td th:text="${p.engarrafado != null ? p.engarrafado.nome : '—'}"></td>
                    <td class="text-end" th:text="${p.quantidadeGarrafas}"></td>
                    <td th:text="${p.destinatario ?: '—'}"></td>
                    <td>
                        <span th:if="${p.aberto}" class="badge bg-warning text-dark">Aberto</span>
                        <span th:unless="${p.aberto}" class="badge bg-success">Fechado</span>
                    </td>
                    <td class="text-end">
                        <a th:if="${p.numeroNota != null}" th:href="@{/processos/comercial/{id}/nota(id=${p.id})}"
                           class="btn btn-sm btn-outline-dark" target="_blank" title="Nota de entrega"><i class="bi bi-printer"></i></a>
                        <a th:href="@{/processos/comercial/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a>
                    </td>
                </tr>
                <tr th:if="${processos.isEmpty()}"><td colspan="7" class="text-center text-muted py-4">Sem entregas registadas.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
