<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Vindima')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <h3 class="mb-1" th:text="${vindima.id == null} ? 'Abrir vindima' : 'Editar vindima'">Vindima</h3>
    <p class="text-muted">Fase 2 — Vindima. Registe a colheita e a entrega da uva na adega.</p>

    <div class="card shadow-sm"><div class="card-body">
        <form th:action="@{/processos/vindima}" th:object="${vindima}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{codigo}">

            <div class="col-md-3" th:if="${vindima.codigo != null}">
                <label class="form-label">Código</label>
                <input class="form-control" th:value="*{codigo}" disabled>
            </div>
            <div class="col-md-5">
                <label class="form-label">Responsável (quem fez)</label>
                <select class="form-select" th:field="*{responsavel}">
                    <option th:value="${null}">—</option>
                    <option th:each="t : ${trabalhadores}" th:value="${t.id}" th:text="${t.nome}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Início</label>
                <input type="datetime-local" class="form-control" th:field="*{dataHoraInicio}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Fim</label>
                <input type="datetime-local" class="form-control" th:field="*{dataHoraFim}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Origem da uva *</label>
                <select class="form-select" th:field="*{origem}" onchange="toggleTerceiro(this)">
                    <option th:each="o : ${origens}" th:value="${o}" th:text="${o.descricao}"></option>
                </select>
            </div>

            <div class="col-md-5">
                <label class="form-label">Vinha vindimada</label>
                <select class="form-select" th:field="*{vinha}">
                    <option th:value="${null}">—</option>
                    <option th:each="v : ${vinhas}" th:value="${v.id}"
                            th:text="${v.nome} + ' (' + ${v.propriedade.descricao} + ')'"></option>
                </select>
                <div class="form-text">Própria → origem automática. De terceiros → registe a vinha como de terceiros nas Fichas.</div>
            </div>
            <div class="col-md-4" id="grpTerceiro">
                <label class="form-label">Terceiro</label>
                <input type="text" class="form-control" th:field="*{terceiro}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Casta principal</label>
                <select class="form-select" th:field="*{castaPrincipal}">
                    <option th:value="${null}">—</option>
                    <option th:each="c : ${castas}" th:value="${c.id}" th:text="${c.nome}"></option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Quantidade (kg)</label>
                <input type="number" step="0.01" min="0" class="form-control" th:field="*{quantidadeKg}">
            </div>
            <div class="col-md-5">
                <label class="form-label">Adega de entrega</label>
                <select class="form-select" th:field="*{adegaDestino}">
                    <option th:value="${null}">—</option>
                    <option th:each="a : ${adegas}" th:value="${a.id}" th:text="${a.nome}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Vasilame (baldes/contentores/reboque)</label>
                <input type="text" class="form-control" th:field="*{vasilame}">
            </div>

            <div class="col-md-6">
                <label class="form-label">Meios utilizados</label>
                <input type="text" class="form-control" th:field="*{meios}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Métodos utilizados</label>
                <input type="text" class="form-control" th:field="*{metodos}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Transporte até à adega</label>
                <input type="text" class="form-control" th:field="*{transporte}">
            </div>
            <div class="col-12">
                <label class="form-label">Observações</label>
                <textarea class="form-control" th:field="*{observacoes}" rows="2"></textarea>
            </div>

            <div class="col-12">
                <button class="btn text-white" style="background-color:#6b1f2a;" type="submit">Guardar</button>
                <a th:href="@{/processos/vindima}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div></div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    function toggleTerceiro(sel) {
        document.getElementById('grpTerceiro').style.display = (sel.value === 'PROPRIA') ? 'none' : '';
    }
    document.addEventListener('DOMContentLoaded', function () {
        toggleTerceiro(document.querySelector('[name=origem]'));
    });
</script>
</body>
</html>
