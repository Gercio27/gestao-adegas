<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Análise à maturação')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <h3 class="mb-1" th:text="${analise.id == null} ? 'Novo boletim de análise' : 'Editar boletim'">Análise à maturação</h3>
    <p class="text-muted">Fase 1.1 — Boletim de análise à maturação, por vinha e casta.</p>

    <div class="card shadow-sm"><div class="card-body">
        <form th:action="@{/processos/maturacao}" th:object="${analise}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{codigo}">

            <div class="col-md-3" th:if="${analise.codigo != null}">
                <label class="form-label">Código</label>
                <input class="form-control" th:value="*{codigo}" disabled>
            </div>
            <div class="col-md-4">
                <label class="form-label">Vinha</label>
                <select class="form-select" th:field="*{vinha}" id="vinha">
                    <option th:value="${null}">—</option>
                    <option th:each="v : ${vinhas}" th:value="${v.id}" th:text="${v.nome}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Casta</label>
                <select class="form-select" th:field="*{casta}" id="casta">
                    <option th:value="${null}">—</option>
                    <option th:each="c : ${castas}" th:value="${c.id}" th:text="${c.nome}"></option>
                </select>
                <div class="form-text" id="castaVazia" style="display:none;">Esta vinha não tem castas associadas.</div>
            </div>
            <div class="col-md-2">
                <label class="form-label">Responsável</label>
                <select class="form-select" th:field="*{responsavel}">
                    <option th:value="${null}">—</option>
                    <option th:each="t : ${trabalhadores}" th:value="${t.id}" th:text="${t.nome}"></option>
                </select>
            </div>

            <div class="col-12"><hr class="my-1"><h6 class="text-muted">Resultados do boletim</h6></div>
            <div class="col-md-3">
                <label class="form-label">Grau provável (% vol)</label>
                <input type="number" step="0.01" min="0" class="form-control" th:field="*{grauProvavel}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Massa Volúmica (g/L)</label>
                <input type="number" step="0.01" min="0" class="form-control" th:field="*{acucar}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Acidez total (g/L)</label>
                <input type="number" step="0.01" min="0" class="form-control" th:field="*{acidezTotal}">
            </div>
            <div class="col-md-3">
                <label class="form-label">pH</label>
                <input type="number" step="0.01" min="0" class="form-control" th:field="*{ph}">
            </div>

            <div class="col-12"><hr class="my-1"><h6 class="text-muted">Execução</h6></div>
            <div class="col-md-4">
                <label class="form-label">Início</label>
                <input type="datetime-local" class="form-control" th:field="*{dataHoraInicio}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Fim</label>
                <input type="datetime-local" class="form-control" th:field="*{dataHoraFim}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Meios (refratómetro, prova, laboratório…)</label>
                <input type="text" class="form-control" th:field="*{meios}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Métodos</label>
                <input type="text" class="form-control" th:field="*{metodos}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Observações</label>
                <input type="text" class="form-control" th:field="*{observacoes}">
            </div>

            <div class="col-12">
                <button class="btn text-white" style="background-color:#6b1f2a;" type="submit">Guardar</button>
                <a th:href="@{/processos/maturacao}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div></div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
    // Mapa vinha -> castas plantadas nessa vinha (ids), fornecido pelo controller.
    const castasPorVinha = /*[[${castasPorVinha}]]*/ {};

    (function () {
        const vinhaSel = document.getElementById('vinha');
        const castaSel = document.getElementById('casta');
        const aviso = document.getElementById('castaVazia');
        if (!vinhaSel || !castaSel) return;

        // Aplica o filtro: mostra apenas as castas da vinha selecionada.
        // limpar=true repoe a casta (usado quando o utilizador muda de vinha).
        function filtrarCastas(limpar) {
            const vid = vinhaSel.value;
            const permitidas = (vid && castasPorVinha[vid]) ? castasPorVinha[vid].map(String) : null;
            if (limpar) castaSel.value = '';

            let disponiveis = 0, unicoValor = '';
            Array.from(castaSel.options).forEach(function (opt) {
                if (!opt.value) { opt.hidden = false; opt.disabled = false; return; } // opção "—"
                const ok = permitidas ? permitidas.includes(opt.value) : true;
                opt.hidden = !ok;
                opt.disabled = !ok;
                if (ok) { disponiveis++; unicoValor = opt.value; }
            });

            // Se a casta atualmente selecionada deixou de ser válida, repõe para "—".
            const selOpt = castaSel.options[castaSel.selectedIndex];
            if (selOpt && selOpt.hidden) castaSel.value = '';

            // A vinha só tem uma casta associada: seleciona-a automaticamente.
            if (disponiveis === 1 && !castaSel.value) castaSel.value = unicoValor;

            if (aviso) aviso.style.display = (vid && disponiveis === 0) ? '' : 'none';
        }

        vinhaSel.addEventListener('change', function () { filtrarCastas(true); });
        filtrarCastas(false); // estado inicial (preserva a casta ao editar)
    })();
</script>
</body>
</html>
