<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Maturação')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h3 class="mb-0"><i class="bi bi-clipboard-data"></i> Análise à maturação <span class="badge bg-secondary">Fase 1</span></h3>
        <a th:href="@{/processos/maturacao/nova}" class="btn text-white" style="background-color:#6b1f2a;">
            <i class="bi bi-plus-lg"></i> Novo boletim
        </a>
    </div>
    <p class="text-muted" th:text="${admin} ? 'Como administrador, vê todos.' : 'Vê os que abriu.'"></p>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr><th>Código</th><th>Vinha</th><th>Casta</th><th class="text-end">Grau prov.</th>
                    <th class="text-end">Açúcar</th><th class="text-end">pH</th><th>Data</th><th>Estado</th><th class="text-end">Ações</th></tr>
                </thead>
                <tbody>
                <tr th:each="p : ${processos}">
                    <td><a th:href="@{/processos/maturacao/{id}(id=${p.id})}"><span class="codigo" th:text="${p.codigo}"></span></a></td>
                    <td th:text="${p.vinha != null ? p.vinha.nome : '—'}"></td>
                    <td th:text="${p.casta != null ? p.casta.nome : '—'}"></td>
                    <td class="text-end" th:text="${p.grauProvavel != null ? p.grauProvavel + '%' : '—'}"></td>
                    <td class="text-end" th:text="${p.acucar != null ? p.acucar + ' g/L' : '—'}"></td>
                    <td class="text-end" th:text="${p.ph ?: '—'}"></td>
                    <td th:text="${p.dataHoraInicio != null ? #temporals.format(p.dataHoraInicio,'dd-MM-yyyy') : ''}"></td>
                    <td>
                        <span th:if="${p.aberto}" class="badge bg-warning text-dark">Aberto</span>
                        <span th:unless="${p.aberto}" class="badge bg-success">Fechado</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/processos/maturacao/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a>
                    </td>
                </tr>
                <tr th:if="${processos.isEmpty()}"><td colspan="9" class="text-center text-muted py-4">Sem boletins registados.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
