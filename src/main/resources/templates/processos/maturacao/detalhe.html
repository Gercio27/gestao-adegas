<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt">
<head th:replace="~{fragments/layout :: head('Boletim de análise')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">
            <i class="bi bi-clipboard-data"></i>
            <span class="codigo" th:text="${analise.codigo}"></span>
            <span th:if="${analise.aberto}" class="badge bg-warning text-dark align-middle">Aberto</span>
            <span th:unless="${analise.aberto}" class="badge bg-success align-middle">Fechado</span>
        </h3>
        <div>
            <a th:if="${analise.aberto}" th:href="@{/processos/maturacao/{id}/editar(id=${analise.id})}"
               class="btn btn-outline-secondary"><i class="bi bi-pencil"></i> Editar</a>
            <form th:if="${analise.aberto}" th:action="@{/processos/maturacao/{id}/fechar(id=${analise.id})}" method="post" class="d-inline">
                <button class="btn btn-success"><i class="bi bi-lock"></i> Fechar boletim</button>
            </form>
            <form sec:authorize="hasRole('ADMIN')" th:unless="${analise.aberto}"
                  th:action="@{/processos/maturacao/{id}/reabrir(id=${analise.id})}" method="post" class="d-inline">
                <button class="btn btn-outline-warning"><i class="bi bi-unlock"></i> Reabrir</button>
            </form>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-6">
            <div class="card shadow-sm"><div class="card-header bg-white fw-bold">Boletim</div><div class="card-body">
                <dl class="row mb-0">
                    <dt class="col-sm-5">Vinha</dt><dd class="col-sm-7" th:text="${analise.vinha != null ? analise.vinha.nome : '—'}"></dd>
                    <dt class="col-sm-5">Casta</dt><dd class="col-sm-7" th:text="${analise.casta != null ? analise.casta.nome : '—'}"></dd>
                    <dt class="col-sm-5">Grau provável</dt><dd class="col-sm-7"><span th:text="${analise.grauProvavel ?: '—'}"></span> % vol</dd>
                    <dt class="col-sm-5">Açúcar</dt><dd class="col-sm-7"><span th:text="${analise.acucar ?: '—'}"></span> g/L</dd>
                    <dt class="col-sm-5">Acidez total</dt><dd class="col-sm-7"><span th:text="${analise.acidezTotal ?: '—'}"></span> g/L</dd>
                    <dt class="col-sm-5">pH</dt><dd class="col-sm-7" th:text="${analise.ph ?: '—'}"></dd>
                </dl>
            </div></div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm"><div class="card-header bg-white fw-bold">Execução</div><div class="card-body">
                <dl class="row mb-0">
                    <dt class="col-sm-5">Responsável</dt><dd class="col-sm-7" th:text="${analise.responsavel != null ? analise.responsavel.nome : '—'}"></dd>
                    <dt class="col-sm-5">Início</dt><dd class="col-sm-7" th:text="${analise.dataHoraInicio != null ? #temporals.format(analise.dataHoraInicio,'dd-MM-yyyy HH:mm') : '—'}"></dd>
                    <dt class="col-sm-5">Fim</dt><dd class="col-sm-7" th:text="${analise.dataHoraFim != null ? #temporals.format(analise.dataHoraFim,'dd-MM-yyyy HH:mm') : '—'}"></dd>
                    <dt class="col-sm-5">Meios</dt><dd class="col-sm-7" th:text="${analise.meios ?: '—'}"></dd>
                    <dt class="col-sm-5">Métodos</dt><dd class="col-sm-7" th:text="${analise.metodos ?: '—'}"></dd>
                    <dt class="col-sm-5">Observações</dt><dd class="col-sm-7" th:text="${analise.observacoes ?: '—'}"></dd>
                </dl>
            </div></div>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/processos/maturacao}" class="btn btn-link">&larr; Voltar</a>
        <a th:href="@{/planeamento}" class="btn btn-link">Ir para o planeamento dos vinhos &rarr;</a>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
