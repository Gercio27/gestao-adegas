<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt">
<head th:replace="~{fragments/layout :: head('O vinho está pronto')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">
            <i class="bi bi-patch-check"></i>
            <span class="codigo" th:text="${passagem.codigo}"></span>
            <span th:if="${passagem.aberto}" class="badge bg-warning text-dark align-middle">Aberto</span>
            <span th:unless="${passagem.aberto}" class="badge bg-success align-middle">Fechado</span>
        </h3>
        <div>
            <a th:if="${passagem.aberto}" th:href="@{/processos/passagem-vinho/{id}/editar(id=${passagem.id})}"
               class="btn btn-outline-secondary"><i class="bi bi-pencil"></i> Editar</a>
            <form th:if="${passagem.aberto}" th:action="@{/processos/passagem-vinho/{id}/fechar(id=${passagem.id})}"
                  method="post" class="d-inline"
                  onsubmit="return confirm('Fechar? Os mostos selecionados passam a vinho pronto a granel.');">
                <button class="btn btn-success"><i class="bi bi-lock"></i> Fechar (passar a vinho)</button>
            </form>
            <form sec:authorize="hasRole('ADMIN')" th:unless="${passagem.aberto}"
                  th:action="@{/processos/passagem-vinho/{id}/reabrir(id=${passagem.id})}" method="post" class="d-inline"
                  onsubmit="return confirm('Reabrir? Os vinhos voltam a mosto em fermentação.');">
                <button class="btn btn-outline-warning"><i class="bi bi-unlock"></i> Reabrir</button>
            </form>
        </div>
    </div>

    <div class="card shadow-sm"><div class="card-body">
        <dl class="row mb-0">
            <dt class="col-sm-3">Mostos convertidos</dt><dd class="col-sm-9" th:text="${passagem.mostosDescricao ?: '—'}"></dd>
            <dt class="col-sm-3">Responsável</dt><dd class="col-sm-9" th:text="${passagem.responsavel != null ? passagem.responsavel.nome : '—'}"></dd>
            <dt class="col-sm-3">Início</dt><dd class="col-sm-9" th:text="${passagem.dataHoraInicio != null ? #temporals.format(passagem.dataHoraInicio,'dd-MM-yyyy HH:mm') : '—'}"></dd>
            <dt class="col-sm-3">Fim</dt><dd class="col-sm-9" th:text="${passagem.dataHoraFim != null ? #temporals.format(passagem.dataHoraFim,'dd-MM-yyyy HH:mm') : '—'}"></dd>
            <dt class="col-sm-3">Meios</dt><dd class="col-sm-9" th:text="${passagem.meios ?: '—'}"></dd>
            <dt class="col-sm-3">Métodos</dt><dd class="col-sm-9" th:text="${passagem.metodos ?: '—'}"></dd>
            <dt class="col-sm-3">Observações</dt><dd class="col-sm-9" th:text="${passagem.observacoes ?: '—'}"></dd>
            <dt class="col-sm-3">Aberto por</dt><dd class="col-sm-9"><span th:text="${passagem.criadoPor}"></span> · <span th:text="${#temporals.format(passagem.dataCriacao,'dd-MM-yyyy HH:mm')}"></span></dd>
        </dl>
    </div></div>

    <div class="mt-3">
        <a th:href="@{/processos/passagem-vinho}" class="btn btn-link">&larr; Voltar</a>
        <a th:href="@{/produtos/mostos/vinhos-granel}" class="btn btn-link">Ver mapa de vinhos a granel &rarr;</a>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
