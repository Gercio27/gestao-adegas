<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-PT">
<head th:replace="~{fragments/layout :: head('Passagem a limpo')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <h3 class="mb-1" th:text="${passagem.id == null} ? 'Passagem a limpo (Vinho está Pronto) — novo registo' : 'Editar registo'">Passagem a limpo</h3>
    <p class="text-muted">Fase 4.4 — Fermentação · Passagem a limpo. Selecione os mostos que ficaram prontos. Ao <strong>fechar</strong>, passam a <strong>vinho pronto a granel</strong>.</p>

    <div class="card shadow-sm"><div class="card-body">
        <form th:action="@{/processos/passagem-vinho}" th:object="${passagem}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{codigo}">

            <div class="col-md-3" th:if="${passagem.codigo != null}">
                <label class="form-label">Código</label>
                <input class="form-control" th:value="*{codigo}" disabled>
            </div>
            <div class="col-md-5">
                <label class="form-label">Responsável</label>
                <select class="form-select" th:field="*{responsavel}">
                    <option th:value="${null}">—</option>
                    <option th:each="t : ${trabalhadores}" th:value="${t.id}" th:text="${t.nome}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Início</label>
                <input type="datetime-local" class="form-control" th:field="*{dataHoraInicio}">
            </div>
            <div class="col-md-2">
                <label class="form-label">Fim</label>
                <input type="datetime-local" class="form-control" th:field="*{dataHoraFim}">
            </div>

            <div class="col-md-3">
                <label class="form-label">Adega</label>
                <select class="form-select" id="pv-adega" onchange="filtrarMostos()">
                    <option value="">— escolher adega —</option>
                    <option th:each="a : ${adegas}" th:value="${a.id}" th:text="${a.nome}"></option>
                </select>
            </div>
            <div class="col-md-9">
                <label class="form-label">Mostos em fermentação a passar a vinho (nesta adega)</label>
                <div class="border rounded p-2" id="pv-mostos" style="max-height:220px;overflow:auto;">
                    <span class="text-muted small">Escolha uma adega.</span>
                </div>
                <div class="mt-1" th:if="${passagem.mostosDescricao != null}">
                    <span class="text-muted small">Já selecionados: </span>
                    <span class="small" th:text="${passagem.mostosDescricao}"></span>
                </div>
            </div>
            <div class="col-md-12">
                <div class="row g-3">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Meios utilizados</label>
                        <input type="text" class="form-control" th:field="*{meios}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Métodos utilizados</label>
                        <input type="text" class="form-control" th:field="*{metodos}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observações</label>
                        <textarea class="form-control" th:field="*{observacoes}" rows="2"></textarea>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <button class="btn text-white" style="background-color:#6b1f2a;" type="submit">Guardar</button>
                <a th:href="@{/processos/passagem-vinho}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div></div>
    <p class="text-muted small mt-2">Se não aparecerem mostos, feche uma moagem primeiro (Fase 3) para os gerar.</p>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
    const mostosPorAdega = /*[[${mostosPorAdega}]]*/ {};
    function filtrarMostos() {
        const adega = document.getElementById('pv-adega').value;
        const box = document.getElementById('pv-mostos');
        const lista = (adega && mostosPorAdega[adega]) ? mostosPorAdega[adega] : [];
        if (!lista.length) {
            box.innerHTML = '<span class="text-muted small">' + (adega ? 'Sem mostos em fermentação nesta adega.' : 'Escolha uma adega.') + '</span>';
            return;
        }
        box.innerHTML = lista.map(function (m) {
            return '<div class="form-check">'
                + '<input class="form-check-input" type="checkbox" name="mostoIds" value="' + m.id + '" id="pvm' + m.id + '">'
                + '<label class="form-check-label small" for="pvm' + m.id + '">' + m.label + '</label></div>';
        }).join('');
    }
    document.addEventListener('DOMContentLoaded', filtrarMostos);
</script>
</body>
</html>
