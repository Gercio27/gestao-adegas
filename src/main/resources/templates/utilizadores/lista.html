<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt">
<head th:replace="~{fragments/layout :: head('Utilizadores')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0"><i class="bi bi-person-gear"></i> Utilizadores</h3>
        <a th:href="@{/utilizadores/novo}" class="btn text-white" style="background-color:#6b1f2a;">
            <i class="bi bi-plus-lg"></i> Novo utilizador
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr><th>Utilizador</th><th>Nome</th><th>Perfil</th><th>Ativo</th><th class="text-end">Ações</th></tr>
                </thead>
                <tbody>
                <tr th:each="u : ${utilizadores}">
                    <td class="codigo" th:text="${u.username}"></td>
                    <td th:text="${u.nome}"></td>
                    <td>
                        <span class="badge" th:classappend="${u.perfil.name() == 'ADMIN'} ? 'bg-danger' : 'bg-primary'"
                              th:text="${u.perfil.descricao}"></span>
                    </td>
                    <td>
                        <span th:if="${u.ativo}" class="badge bg-success">Sim</span>
                        <span th:unless="${u.ativo}" class="badge bg-secondary">Não</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/utilizadores/{id}/editar(id=${u.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/utilizadores/{id}/eliminar(id=${u.id})}" method="post" class="d-inline"
                              th:if="${u.username != #authentication.name}"
                              onsubmit="return confirm('Eliminar este utilizador?');">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${utilizadores.isEmpty()}"><td colspan="5" class="text-center text-muted py-4">Sem utilizadores.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
