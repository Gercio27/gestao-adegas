<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:replace="~{fragments/layout :: head('Análises aos vinhos')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: mensagens}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0"><i class="bi bi-clipboard-data"></i> Análises aos vinhos</h3>
        <a th:href="@{/analises/nova}" class="btn text-white" style="background-color:#6b1f2a;">
            <i class="bi bi-plus-lg"></i> Nova análise
        </a>
    </div>
    <p class="text-muted small">Histórico de análises por vinho (ordenado por vinho e data). Cada análise tem o respetivo PDF.</p>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr><th>Código</th><th>Vinho</th><th>Fase</th><th>Adega</th><th>Onde estava</th>
                    <th>Data</th><th>PDF</th><th class="text-end">Ações</th></tr>
                </thead>
                <tbody>
                <tr th:each="a : ${analises}">
                    <td><span class="codigo" th:text="${a.codigo}"></span></td>
                    <td class="fw-semibold" th:text="${a.vinhoNome ?: '—'}"></td>
                    <td th:text="${a.categoria.descricao}"></td>
                    <td th:text="${a.adega != null ? a.adega.nome : '—'}"></td>
                    <td class="small" th:text="${a.recipientesDescricao ?: '—'}"></td>
                    <td th:text="${a.dataAnalise != null ? #temporals.format(a.dataAnalise,'dd-MM-yyyy') : '—'}"></td>
                    <td>
                        <a th:if="${a.temPdf}" th:href="@{/analises/{id}/pdf(id=${a.id})}" target="_blank">
                            <i class="bi bi-file-earmark-pdf"></i> <span th:text="${a.analisePdfNome ?: 'ver PDF'}"></span></a>
                        <span th:unless="${a.temPdf}" class="text-muted">—</span>
                    </td>
                    <td class="text-end">
                        <form th:action="@{/analises/{id}/eliminar(id=${a.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Eliminar este registo de análise?');">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${analises.isEmpty()}"><td colspan="8" class="text-center text-muted py-4">Sem análises registadas.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
